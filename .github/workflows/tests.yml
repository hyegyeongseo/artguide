name: tests

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # 단위 테스트는 무거운 의존(torch·mediapipe·CLIP·DB) 없이 도는 게 설계 원칙이다.
      # 테스트가 실제로 import 하는 가벼운 의존만 설치한다.
      - name: Install light deps
        run: pip install fastapi pydantic pydantic-settings pyyaml numpy pillow sqlalchemy
      - name: Run custom test runner
        working-directory: artref/api
        run: python run_tests.py

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        working-directory: woz
        run: npm ci || npm install
      - name: Lint (advisory)
        working-directory: woz
        continue-on-error: true
        run: npm run lint --if-present
      - name: Build
        working-directory: woz
        run: npm run build
