name: CI

# 단독 artguide 백엔드 CI — 린트 + 자산 SSOT 검사 + 테스트(가벼움) + 도커 빌드 스모크.
#   배포(CD: build→ECR→ECS)는 팀 repo 의 fastapi-cd.yml 가 담당한다.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint + asset drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install ruff
      - name: Ruff (real-error subset)
        run: ruff check artref --select E9,F63,F7,F82 --output-format=github
      # 자산 단일 소스(artref/assets) ↔ 프론트 미러(woz/public) 가 어긋났는지 검사.
      # 한쪽만 고치고 `python artref/tools/sync_assets.py` 안 돌린 경우 여기서 비0 종료로 잡는다.
      - name: Asset SSOT drift check
        run: python artref/tools/sync_assets.py --check

  test:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: artref/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      # artguide 테스트는 의도적으로 가볍게 설계됨(torch/mediapipe 불필요) → 가벼운 의존만 설치.
      - name: Install light test deps
        run: pip install pydantic pydantic-settings pyyaml numpy sqlalchemy pillow
      - name: Run test suite (run_tests.py)
        run: python run_tests.py

  build:
    name: Docker build (smoke)
    # 이미지가 깨지지 않고 빌드되는지만 확인(레지스트리 푸시 X). 컨텍스트=artref/api (Dockerfile·compose 와 동일).
    #   prod 이미지에 assets 를 굽는 건(artref 컨텍스트) 팀 fastapi-cd 담당. 여기선 빌드 가능 여부만 본다.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build api image
        run: docker build -f artref/api/Dockerfile -t artref-api:ci artref/api
