<svg viewBox="0 0 480 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="vanishing_point_convergence">
  <style>
    .guide { fill:none; stroke:#c7ccd4; stroke-width:2.5; }
    .gfill { fill:#c7ccd4; opacity:.18; stroke:none; }
    .cons  { fill:none; stroke:#e0533d; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }
    .consd { fill:none; stroke:#e0533d; stroke-width:2; stroke-dasharray:6 5; }
    .acc   { fill:none; stroke:#2f6df0;  stroke-width:2.5; stroke-linecap:round; }
    .accd  { fill:none; stroke:#2f6df0;  stroke-width:2; stroke-dasharray:6 5; }
    .dot   { fill:#e0533d; stroke:none; }
    .adot  { fill:#2f6df0; stroke:none; }
    .lbl   { fill:#3a3f47; font-family:'Pretendard','Apple SD Gothic Neo',sans-serif; font-size:14px; }
    .cap   { fill:#3a3f47; font-family:'Pretendard','Apple SD Gothic Neo',sans-serif; font-size:13px; opacity:.8; }
    .tag   { fill:#e0533d; font-family:sans-serif; font-size:12px; font-weight:600; }
  </style>
  <g id="guide"><line class="guide" x1="20" y1="170" x2="460" y2="170"/><path class="gfill" d="M90 440 L240 170 L390 440 Z"/></g>
  <g id="construction"><line class="cons" x1="90" y1="440" x2="240" y2="170"/><line class="cons" x1="390" y1="440" x2="240" y2="170"/><line class="consd" x1="112" y1="335" x2="224" y2="194"/><line class="cons" x1="112" y1="430" x2="112" y2="335"/><line class="cons" x1="165" y1="320" x2="165" y2="265"/><line class="cons" x1="203" y1="250" x2="203" y2="218"/><line class="cons" x1="224" y1="212" x2="224" y2="194"/><circle class="adot" cx="240" cy="170" r="5"/></g>
  <g id="label"><text class="lbl" x="250" y="166">소실점</text><text class="lbl" x="60" y="430" fill="#3a3f47">평행선 → 한 점</text><text class="lbl" x="250" y="300" fill="#3a3f47">같은 간격도 멀수록 좁게</text>
    <text class="cap" x="20" y="462">평행선은 소실점 하나로 모이고, 같은 크기·간격도 멀수록 작아진다.</text>
  </g>
</svg>
