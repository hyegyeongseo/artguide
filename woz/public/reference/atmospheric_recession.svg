<svg viewBox="0 0 480 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="atmospheric_recession">
  <style>
    .guide { fill:none; stroke:#c7ccd4; stroke-width:2.5; }
    .gfill { fill:#c7ccd4; opacity:.18; stroke:none; }
    .cons  { fill:none; stroke:#e0533d; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }
    .consd { fill:none; stroke:#e0533d; stroke-width:2; stroke-dasharray:6 5; }
    .acc   { fill:none; stroke:#2f6df0;  stroke-width:2.5; stroke-linecap:round; }
    .accd  { fill:none; stroke:#2f6df0;  stroke-width:2; stroke-dasharray:6 5; }
    .dot   { fill:#e0533d; stroke:none; }
    .adot  { fill:#2f6df0; stroke:none; }
    .lbl   { fill:#3a3f47; font-family:'Pretendard','Apple SD Gothic Neo',sans-serif; font-size:14px; }
    .cap   { fill:#3a3f47; font-family:'Pretendard','Apple SD Gothic Neo',sans-serif; font-size:13px; opacity:.8; }
    .tag   { fill:#e0533d; font-family:sans-serif; font-size:12px; font-weight:600; }
  </style>
  <g id="guide"><path d="M0 175 Q120 150 240 168 T480 162 V210 H0 Z" fill="#cdd1d6"/><path d="M0 215 Q140 188 280 208 T480 205 V255 H0 Z" fill="#a1a6ae"/><path d="M0 258 Q120 228 250 252 T480 246 V305 H0 Z" fill="#70757f"/><path d="M0 305 Q150 270 300 300 T480 292 V440 H0 Z" fill="#3f444c"/></g>
  <g id="construction"><line class="accd" x1="440" y1="300" x2="440" y2="170"/><path class="acc" d="M440 178 l-6 12 h12 z" fill="#2f6df0"/></g>
  <g id="label"><text class="lbl" x="20" y="335" fill="#f0f0f0">가까움 — 진하고 또렷</text><text class="lbl" x="250" y="160" fill="#3a3f47">멀어짐 — 옅고·대비↓·차갑게</text>
    <text class="cap" x="20" y="462">멀어질수록 명도는 올라가고 대비는 줄며 색이 차가워진다(공기원근).</text>
  </g>
</svg>
