  <g id="label"><text class="lbl" x="56" y="62">읽힘 (틈이 보임)</text><text class="lbl" x="276" y="62">안 읽힘 (덩어리)</text><text class="lbl" x="60" y="384" fill="#e0533d">팔다리 사이 음형</text>
