  </defs><rect x="70" y="90" width="340" height="250" fill="none" stroke="#3a3f47" stroke-width="1.6"/><rect x="70" y="90" width="340" height="250" fill="#eef0f2"/><rect x="70" y="90" width="340" height="250" fill="none" stroke="#3a3f47" stroke-width="1.6"/><path d="M220 130 C290 130 310 210 290 260 C280 290 300 310 290 320 L220 320 Z" fill="#3a3f47"/><text class="atag" x="130" y="210">음(여백)</text><text class="lbl" x="255" y="210" text-anchor="middle" fill="#ffffff">양(주제)</text><path d="M220 130 C290 130 310 210 290 260 C280 290 300 310 290 320 L220 320 Z" fill="none" stroke="#e0533d" stroke-width="2"/><text class="lbl" x="40" y="380">주제(양)만큼 그 주변 여백(음)의 모양도 디자인한다 — 둘 다 좋아야 구도가 산다.</text><text class="cap" x="20" y="462">음·양(여백·주제): 주제만큼 그 주변 빈 공간의 모양도 디자인해야 화면이 짜임새 있다.</text>
