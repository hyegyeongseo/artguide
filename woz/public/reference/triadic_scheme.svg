ygon class="guide" points="170,70 274,250 66,250"/><text class="tag" x="330" y="150">3색조(트라이어드)</text><text class="lbl" x="330" y="180">색환을 3등분한 세 색.</text><text class="lbl" x="330" y="220">선명하고 균형 잡힘.</text><text class="lbl" x="330" y="270">하나를 지배색으로,</text><text class="lbl" x="330" y="298">둘은 적게 — 안 그러면 산만.</text><text class="cap" x="20" y="462">3색조: 색환을 3등분한 세 색(선명·균형). 하나를 지배색으로, 나머지는 적게 써야 안 산만하다.</text>
