    <marker id="ag" markerWidth="10" markerHeight="10" refX="7.5" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#9aa1ab"/></marker>
  </defs><rect x="70" y="95" width="340" height="210" fill="none" stroke="#3a3f47" stroke-width="1.6"/><line class="gthin" x1="280" y1="95" x2="280" y2="305"/><line class="gthin" x1="280" y1="225" x2="410" y2="225"/><line class="gthin" x1="330" y1="225" x2="330" y2="305"/><line class="gthin" x1="330" y1="305" x2="410" y2="305"/><path class="cons" d="M70 305 A 210 210 0 0 1 280 95 A 130 130 0 0 1 410 225 A 80 80 0 0 1 410 305 A 50 50 0 0 1 360 305"/><circle class="dot" cx="360" cy="305" r="5"/><text class="tag" x="320" y="335">초점</text><text class="lbl" x="40" y="360">황금비 나선: 정사각형이 점점 작아지며 한 점으로 감긴다 — 그 안쪽에 초점을 둔다.</text><text class="cap" x="20" y="462">황금나선: 화면을 황금비로 분할하며 감기는 나선. 그 수렴점에 초점을 두면 시선이 자연히 모인다.</text>
