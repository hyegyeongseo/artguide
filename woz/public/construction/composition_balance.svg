<svg viewBox="0 0 480 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="composition_balance">
  <style>
    .guide { fill:none; stroke:#c7ccd4; stroke-width:2.5; }
    .gfill { fill:#c7ccd4; opacity:.18; stroke:none; }
    .cons  { fill:none; stroke:#e0533d; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }
    .consd { fill:none; stroke:#e0533d; stroke-width:2; stroke-dasharray:6 5; }
    .acc   { fill:none; stroke:#2f6df0;  stroke-width:2.5; stroke-linecap:round; }
    .dot   { fill:#e0533d; stroke:none; }
    .lbl   { fill:#3a3f47; font-family:'Pretendard','Apple SD Gothic Neo',sans-serif; font-size:14px; }
    .cap   { fill:#3a3f47; font-family:'Pretendard','Apple SD Gothic Neo',sans-serif; font-size:13px; opacity:.8; }
    .tag   { fill:#e0533d; font-family:sans-serif; font-size:12px; font-weight:600; }
  </style>
  <g id="guide"></g>
  <g id="construction"><rect class="guide" x="60" y="60" width="360" height="360"/><line class="consd" x1="180.0" y1="60" x2="180.0" y2="420"/><line class="consd" x1="60" y1="180.0" x2="420" y2="180.0"/><line class="consd" x1="300.0" y1="60" x2="300.0" y2="420"/><line class="consd" x1="60" y1="300.0" x2="420" y2="300.0"/><circle class="dot" cx="180.0" cy="180.0" r="14"/><circle class="gfill" cx="300.0" cy="300.0" r="34"/></g>
  <g id="label"><text class="lbl" x="202.0" y="185.0">초점(교점)</text><text class="lbl" x="270.0" y="360.0">균형 매스</text>
    <text class="cap" x="20" y="462">주제를 정중앙에서 한 칸 옮겨 3분할 교점에.</text>
  </g>
</svg>
