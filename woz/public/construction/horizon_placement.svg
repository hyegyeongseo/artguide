<svg viewBox="0 0 480 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="horizon_placement">
  <style>
    .guide { fill:none; stroke:#c7ccd4; stroke-width:2.5; }
    .gfill { fill:#c7ccd4; opacity:.18; stroke:none; }
    .cons  { fill:none; stroke:#e0533d; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }
    .consd { fill:none; stroke:#e0533d; stroke-width:2; stroke-dasharray:6 5; }
    .acc   { fill:none; stroke:#2f6df0;  stroke-width:2.5; stroke-linecap:round; }
    .dot   { fill:#e0533d; stroke:none; }
    .lbl   { fill:#3a3f47; font-family:'Pretendard','Apple SD Gothic Neo',sans-serif; font-size:14px; }
    .cap   { fill:#3a3f47; font-family:'Pretendard','Apple SD Gothic Neo',sans-serif; font-size:13px; opacity:.8; }
    .tag   { fill:#e0533d; font-family:sans-serif; font-size:12px; font-weight:600; }
  </style>
  <g id="guide"></g>
  <g id="construction"><rect class="gfill" x="60" y="60" width="360" height="240"/><rect class="guide" x="60" y="60" width="360" height="360"/><line class="consd" x1="60" y1="180" x2="420" y2="180"/><line class="consd" x1="60" y1="300" x2="420" y2="300"/><line class="cons" x1="60" y1="300" x2="420" y2="300"/><line class="acc" x1="60" y1="240" x2="420" y2="240" stroke-dasharray="4 5"/></g>
  <g id="label"><text class="lbl" x="68" y="290">지평선 = 아래 1/3</text><text class="lbl" x="68" y="86">하늘이 주연</text><text class="tag" x="354" y="232" fill="#2f6df0">중앙 ✗</text>
    <text class="cap" x="20" y="462">지평선을 위/아래 1/3에 — 정중앙은 피해.</text>
  </g>
</svg>
