<svg viewBox="0 0 480 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="linear_perspective">
  <style>
    .guide { fill:none; stroke:#c7ccd4; stroke-width:2.5; }
    .gfill { fill:#c7ccd4; opacity:.18; stroke:none; }
    .cons  { fill:none; stroke:#e0533d; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }
    .consd { fill:none; stroke:#e0533d; stroke-width:2; stroke-dasharray:6 5; }
    .acc   { fill:none; stroke:#2f6df0;  stroke-width:2.5; stroke-linecap:round; }
    .dot   { fill:#e0533d; stroke:none; }
    .lbl   { fill:#3a3f47; font-family:'Pretendard','Apple SD Gothic Neo',sans-serif; font-size:14px; }
    .cap   { fill:#3a3f47; font-family:'Pretendard','Apple SD Gothic Neo',sans-serif; font-size:13px; opacity:.8; }
    .tag   { fill:#e0533d; font-family:sans-serif; font-size:12px; font-weight:600; }
  </style>
  <g id="guide"><line class="guide" x1="40" y1="205" x2="440" y2="205"/></g>
  <g id="construction"><line class="cons" x1="120" y1="430" x2="240" y2="205"/><line class="cons" x1="360" y1="430" x2="240" y2="205"/><line class="consd" x1="60" y1="110" x2="240" y2="205"/><line class="consd" x1="60" y1="330" x2="240" y2="205"/><line class="consd" x1="420" y1="110" x2="240" y2="205"/><line class="consd" x1="420" y1="330" x2="240" y2="205"/><rect class="guide" x="60" y="110" width="90" height="220"/><rect class="guide" x="330" y="110" width="90" height="220"/><circle class="dot" cx="240" cy="205" r="7"/></g>
  <g id="label"><text class="lbl" x="252" y="197">소실점</text><text class="lbl" x="44" y="197">눈높이(지평선)</text>
    <text class="cap" x="20" y="462">눈높이 선과 소실점 하나로 가장자리들을 모아.</text>
  </g>
</svg>
