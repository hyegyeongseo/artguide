<svg viewBox="0 0 480 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="value_structure">
  <style>
    .guide { fill:none; stroke:#c7ccd4; stroke-width:2.5; }
    .gfill { fill:#c7ccd4; opacity:.18; stroke:none; }
    .cons  { fill:none; stroke:#e0533d; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }
    .consd { fill:none; stroke:#e0533d; stroke-width:2; stroke-dasharray:6 5; }
    .acc   { fill:none; stroke:#2f6df0;  stroke-width:2.5; stroke-linecap:round; }
    .dot   { fill:#e0533d; stroke:none; }
    .lbl   { fill:#3a3f47; font-family:'Pretendard','Apple SD Gothic Neo',sans-serif; font-size:14px; }
    .cap   { fill:#3a3f47; font-family:'Pretendard','Apple SD Gothic Neo',sans-serif; font-size:13px; opacity:.8; }
    .tag   { fill:#e0533d; font-family:sans-serif; font-size:12px; font-weight:600; }
  </style>
  <g id="guide"></g>
  <g id="construction"><rect x="60" y="60" width="80" height="80" fill="#f0f0f0" stroke="#3a3f47" stroke-width="1.5"/><rect x="150" y="60" width="80" height="80" fill="#9aa0a8" stroke="#3a3f47" stroke-width="1.5"/><rect x="240" y="60" width="80" height="80" fill="#33373d" stroke="#3a3f47" stroke-width="1.5"/><path d="M250 230 A90 90 0 0 1 250 410 A90 90 0 0 1 250 230" fill="#9aa0a8"/><path d="M250 230 A90 90 0 0 0 175 360 A70 70 0 0 0 250 392 Z" fill="#33373d" opacity=".9"/><circle cx="290" cy="285" r="22" fill="#f4f4f4"/><ellipse cx="290" cy="425" rx="80" ry="16" fill="#33373d" opacity=".35"/></g>
  <g id="label"><text class="lbl" x="60" y="175">밝음</text><text class="lbl" x="150" y="175">중간</text><text class="lbl" x="240" y="175">어둠</text>
    <text class="cap" x="20" y="462">흑백 3단(밝음·중간·어둠)으로 나눠 빠진 단계 확인.</text>
  </g>
</svg>
