<svg viewBox="0 0 480 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="head_construction">
  <style>
    .guide { fill:none; stroke:#c7ccd4; stroke-width:2.5; }
    .gfill { fill:#c7ccd4; opacity:.18; stroke:none; }
    .cons  { fill:none; stroke:#e0533d; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }
    .consd { fill:none; stroke:#e0533d; stroke-width:2; stroke-dasharray:6 5; }
    .acc   { fill:none; stroke:#2f6df0;  stroke-width:2.5; stroke-linecap:round; }
    .accd  { fill:none; stroke:#2f6df0;  stroke-width:2; stroke-dasharray:6 5; }
    .dot   { fill:#e0533d; stroke:none; }
    .adot  { fill:#2f6df0; stroke:none; }
    .lbl   { fill:#3a3f47; font-family:'Pretendard','Apple SD Gothic Neo',sans-serif; font-size:14px; }
    .cap   { fill:#3a3f47; font-family:'Pretendard','Apple SD Gothic Neo',sans-serif; font-size:13px; opacity:.8; }
    .tag   { fill:#e0533d; font-family:sans-serif; font-size:12px; font-weight:600; }
  </style>
  <g id="guide"><circle class="gfill" cx="240" cy="150" r="90"/><path class="gfill" d="M150 240 C150 400 190 420 240 420 C290 420 330 400 330 240 Z"/></g>
  <g id="construction"><circle class="cons" cx="240" cy="150" r="90"/><ellipse class="consd" cx="168" cy="150" rx="20" ry="84"/><ellipse class="consd" cx="312" cy="150" rx="20" ry="84"/><path class="cons" d="M150 240 C150 400 190 420 240 420 C290 420 330 400 330 240"/><line class="acc" x1="240" y1="60" x2="240" y2="420"/><line class="consd" x1="130" y1="150" x2="350" y2="150"/><line class="consd" x1="130" y1="240" x2="350" y2="240"/><line class="consd" x1="130" y1="330" x2="350" y2="330"/></g>
  <g id="label"><text class="lbl" x="356" y="150">머리통(공)</text><text class="lbl" x="148" y="120" text-anchor="end">측면 평면</text><text class="lbl" x="356" y="154">머리선</text><text class="lbl" x="356" y="244">눈썹선</text><text class="lbl" x="356" y="334">코밑</text><text class="lbl" x="356" y="424">턱끝</text><text class="lbl" x="234" y="54" fill="#2f6df0" text-anchor="end">중심선</text>
    <text class="cap" x="20" y="462">머리 = 공(머리통) + 턱. 중심선·눈썹선부터 잡고 얼굴은 3등분.</text>
  </g>
</svg>
