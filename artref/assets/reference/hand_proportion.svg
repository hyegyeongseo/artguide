  </defs><rect x="170" y="150" width="110" height="120" fill="none" stroke="#c7ccd4" stroke-width="2"/><text class="lbl" x="150" y="215" text-anchor="end">손바닥</text><rect x="182" y="42" width="18" height="108" fill="none" stroke="#e0533d" stroke-width="2"/><rect x="208" y="28" width="18" height="122" fill="none" stroke="#e0533d" stroke-width="2"/><rect x="234" y="34" width="18" height="116" fill="none" stroke="#e0533d" stroke-width="2"/><rect x="260" y="54" width="18" height="96" fill="none" stroke="#e0533d" stroke-width="2"/><line class="consd" x1="170" y1="150" x2="280" y2="150"/><path class="cons" d="M170 230 C140 235 135 200 158 185"/><text class="tag" x="300" y="110">손가락 길이 ≈ 손바닥 길이</text><text class="lbl" x="300" y="200">중지가 가장 김</text><text class="lbl" x="300" y="230">엄지는 손바닥 중간까지</text><text class="cap" x="20" y="462">손 비율: 손가락 길이 ≈ 손바닥 길이. 중지가 가장 길고, 엄지는 손바닥 중간까지.</text>
