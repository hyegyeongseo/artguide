<svg viewBox="0 0 480 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="notan_massing">
  <style>
    .guide { fill:none; stroke:#c7ccd4; stroke-width:2.5; }
    .gfill { fill:#c7ccd4; opacity:.18; stroke:none; }
    .cons  { fill:none; stroke:#e0533d; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }
    .consd { fill:none; stroke:#e0533d; stroke-width:2; stroke-dasharray:6 5; }
    .acc   { fill:none; stroke:#2f6df0;  stroke-width:2.5; stroke-linecap:round; }
    .accd  { fill:none; stroke:#2f6df0;  stroke-width:2; stroke-dasharray:6 5; }
    .dot   { fill:#e0533d; stroke:none; }
    .adot  { fill:#2f6df0; stroke:none; }
    .lbl   { fill:#3a3f47; font-family:'Pretendard','Apple SD Gothic Neo',sans-serif; font-size:14px; }
    .cap   { fill:#3a3f47; font-family:'Pretendard','Apple SD Gothic Neo',sans-serif; font-size:13px; opacity:.8; }
    .tag   { fill:#e0533d; font-family:sans-serif; font-size:12px; font-weight:600; }
  </style>
  <g id="guide"></g>
  <g id="construction"><rect x="40" y="80" width="170" height="200" fill="#ededed" stroke="#3a3f47" stroke-width="1.5"/><circle cx="80" cy="130" r="16" fill="#33373d"/><circle cx="160" cy="116" r="12" fill="#33373d"/><circle cx="70" cy="210" r="14" fill="#33373d"/><circle cx="150" cy="230" r="18" fill="#33373d"/><circle cx="110" cy="180" r="10" fill="#33373d"/><rect x="270" y="80" width="170" height="200" fill="#ededed" stroke="#3a3f47" stroke-width="1.5"/><path d="M270 150 Q340 110 390 170 L390 280 L270 280 Z" fill="#33373d"/><circle cx="410" cy="128" r="26" fill="#33373d"/></g>
  <g id="label"><text class="lbl" x="40" y="66">흩어진 값 · 약함</text><text class="lbl" x="270" y="66">덩어리로 묶음 · 강함</text><text class="lbl" x="80" y="314" fill="#e0533d">→</text><text class="lbl" x="100" y="314">큰 명암 덩어리부터</text>
    <text class="cap" x="20" y="462">명암을 큰 덩어리로 묶어(노탄) 화면의 무게 균형을 먼저 본다.</text>
  </g>
</svg>
