  <g id="label"><text class="lbl" x="110" y="312" text-anchor="middle">내려봄</text><text class="lbl" x="240" y="312" text-anchor="middle">정면</text><text class="lbl" x="370" y="312" text-anchor="middle">올려봄</text>
