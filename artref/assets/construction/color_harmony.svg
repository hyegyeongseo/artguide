<svg viewBox="0 0 480 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="color_harmony">
  <style>
    .guide { fill:none; stroke:#c7ccd4; stroke-width:2.5; }
    .gfill { fill:#c7ccd4; opacity:.18; stroke:none; }
    .cons  { fill:none; stroke:#e0533d; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }
    .consd { fill:none; stroke:#e0533d; stroke-width:2; stroke-dasharray:6 5; }
    .acc   { fill:none; stroke:#2f6df0;  stroke-width:2.5; stroke-linecap:round; }
    .dot   { fill:#e0533d; stroke:none; }
    .lbl   { fill:#3a3f47; font-family:'Pretendard','Apple SD Gothic Neo',sans-serif; font-size:14px; }
    .cap   { fill:#3a3f47; font-family:'Pretendard','Apple SD Gothic Neo',sans-serif; font-size:13px; opacity:.8; }
    .tag   { fill:#e0533d; font-family:sans-serif; font-size:12px; font-weight:600; }
  </style>
  <g id="guide"></g>
  <g id="construction"><rect x="60" y="80" width="110" height="110" rx="8" fill="#3d5a73"/><rect x="190" y="80" width="110" height="110" rx="8" fill="#b89a6a"/><rect x="320" y="80" width="110" height="110" rx="8" fill="#d14b3d"/><rect x="60" y="250" width="216" height="40" fill="#3d5a73"/><rect x="276" y="250" width="108" height="40" fill="#b89a6a"/><rect x="384" y="250" width="36" height="40" fill="#d14b3d"/></g>
  <g id="label"><text class="lbl" x="60" y="215">주조</text><text class="lbl" x="190" y="215">보조</text><text class="lbl" x="320" y="215">강조</text><text class="cap" x="60" y="320">제한된 팔레트(주조1·보조1·강조1)로 통일감.</text>
    <text class="cap" x="20" y="462">주조1 + 보조1 + 강조1로 팔레트를 좁혀.</text>
  </g>
</svg>
