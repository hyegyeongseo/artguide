  <g id="guide"><line class="guide" x1="250" y1="60" x2="250" y2="420"/><circle class="gfill" cx="250" cy="82" r="22"/><path class="gfill" d="M210 150 q40 -25 80 0 l-12 108 l8 153 l-22 0 l-12 -117 l-12 117 l-22 0 l8 -153 Z"/></g>
