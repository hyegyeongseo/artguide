<svg viewBox="0 0 480 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="weight_balance">
  <style>
    .guide { fill:none; stroke:#c7ccd4; stroke-width:2.5; }
    .gfill { fill:#c7ccd4; opacity:.18; stroke:none; }
    .cons  { fill:none; stroke:#e0533d; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }
    .consd { fill:none; stroke:#e0533d; stroke-width:2; stroke-dasharray:6 5; }
    .acc   { fill:none; stroke:#2f6df0;  stroke-width:2.5; stroke-linecap:round; }
    .dot   { fill:#e0533d; stroke:none; }
    .lbl   { fill:#3a3f47; font-family:'Pretendard','Apple SD Gothic Neo',sans-serif; font-size:14px; }
    .cap   { fill:#3a3f47; font-family:'Pretendard','Apple SD Gothic Neo',sans-serif; font-size:13px; opacity:.8; }
    .tag   { fill:#e0533d; font-family:sans-serif; font-size:12px; font-weight:600; }
  </style>
  <g id="guide"><path class="gfill" d="M210 110 q40 -30 80 0 l-6 110 q24 80 6 200 l-26 0 l-12 -150 l-18 150 l-26 0 q18 -120 6 -200 Z"/></g>
  <g id="construction"><line class="cons" x1="200" y1="150" x2="300" y2="135"/><line class="cons" x1="210" y1="250" x2="298" y2="262"/><line class="consd" x1="252" y1="120" x2="252" y2="420"/><circle class="dot" cx="252" cy="120" r="5"/><circle class="dot" cx="252" cy="418" r="6"/></g>
  <g id="label"><text class="lbl" x="305" y="139">어깨</text><text class="lbl" x="305" y="266">골반</text><text class="lbl" x="258" y="135">무게중심선</text><text class="lbl" x="258" y="435">지지발</text>
    <text class="cap" x="20" y="462">지지발을 먼저 정하고, 그 위로 머리 중심이 오게.</text>
  </g>
</svg>
