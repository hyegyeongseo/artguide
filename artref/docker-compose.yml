services:
  mysql:
    image: mysql:8.4
    environment: { MYSQL_ROOT_PASSWORD: devpass, MYSQL_DATABASE: artref }
    ports: ["3306:3306"]
    volumes: ["mysql_data:/var/lib/mysql"]
  qdrant:
    # :latest 금지 — 정확한 태그로 고정(재현성). 운영 검증본에 맞춰 조정.
    image: qdrant/qdrant:v1.15.5
    ports: ["6333:6333"]
    volumes: ["qdrant_data:/qdrant/storage"]
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment: { MINIO_ROOT_USER: minio, MINIO_ROOT_PASSWORD: minio12345 }
    ports: ["9000:9000", "9001:9001"]
    volumes: ["minio_data:/data"]
  api:
    build: ./api
    env_file: .env
    depends_on: [mysql, qdrant, minio]
    ports: ["8000:8000"]
    environment:
      - VLM_BACKEND=vertex
      - GOOGLE_CLOUD_PROJECT=project-761a4dff-7717-4f75-a4a
      - GOOGLE_CLOUD_LOCATION=global
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/adc.json
      - HAND_VLM=1
    # 관리 작업(시드/eval)을 컨테이너 안에서 돌리기 위한 읽기전용 소스 마운트.
    #   docker compose exec -w /repo api python scripts/seed_museum.py all
    volumes:
      - ./secrets/adc.json:/secrets/adc.json:ro
      - "./:/repo:ro"
      - "./datasets:/data:rw"   # 적재 입력·QC로그용 쓰기 경로(api 컨테이너 전용 /data).
                                #   datasets/ 는 artref/ 안에 두기 — '..' 상대 바인드는 Windows/Docker Desktop에서 재생성 시 깨짐.
volumes: { mysql_data: , qdrant_data: , minio_data: }
